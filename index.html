<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Photobooth App</h1>
  
  <video id="video" autoplay width="640" height="480"></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
  <canvas id="finalCanvas" style="display:none;"></canvas>
  <img id="strip" alt="Your Photo Strip" />
  <div id="countdown"></div>
  <button onclick="startBooth()">Start Booth</button>

  <script src="script.js"></script>
</body>
</html>
